instances:
  bayer-17909:
    services:
      internal:
        url_env:   BAYER_INTERNAL_URL    # env var holding the base URL
        token_env: BAYER_INTERNAL_TOKEN  # env var holding the bearer token (optional)
    streams:
      - stream: cdc.orders
        handler: order-sync@v1
      - stream: cdc.products
        handler: product-sync
  beigene-22001:
    services:
      internal:
        url_env:   BEIGENE_INTERNAL_URL
        token_env: BEIGENE_INTERNAL_TOKEN
    streams:
      - stream: cdc.orders
        handler: order-sync@v2
      - stream: cdc.products
        handler: product-sync

  # Example: gateway-authenticated instance.
  # The gateway client logs in with app_instance_code + api_key (machine-to-machine),
  # caches the returned JWT, and refreshes it automatically near expiry.
  # Forward events through it with the `gateway-sync` handler.
  gateway-example:
    services:
      gateway:
        url_env:               GATEWAY_URL         # base URL; api_login = <url>/api/auth/api_login/
        app_instance_code_env: APP_INSTANCE_CODE   # env var holding this app's instance code
        api_key_env:           GATEWAY_API_SECRET  # env var holding the gateway API secret key
    streams:
      - stream: cdc.orders
        handler: gateway-sync

  # Example: enrichment instance
  # Enrichment lets Dasher resolve lookup data (e.g. a user's email by role ID)
  # before dispatching downstream, keeping queries off the WALker replication path.
  enrichment-example:
    services:
      internal:
        url_env:   DASHER_INTERNAL_URL    # name of env var holding the base URL
        token_env: DASHER_INTERNAL_TOKEN  # name of env var holding the bearer token (optional)
      # db: pool for sql lookups; DSN comes from env (never hardcode secrets).
      # Point at the PRIMARY.
      db:
        dsn_env: DASHER_DB_DSN    # name of env var holding the connection string
        max_conns: 4              # optional, default 4

    # Named lookup catalog. Each entry is resolved once at startup.
    lookups:
      user_email_by_role:
        type: sql                 # only supported type in v1
        ttl: 24h                  # in-process LRU+TTL cache TTL; required in practice
        sql: |
          SELECT u.email
          FROM users u
          JOIN user_roles ur ON ur.user_id = u.id
          WHERE ur.id = @role_id  # @param_name must match bind key

    streams:
      # PURE TRANSFORM: enrich + emit, no handler.
      # Reads cdc.user_role_grant, enriches with user email, emits enriched event.
      # scope: instance (default) — key is "<instanceID>.cdc.user_role_grant".
      - stream: cdc.user_role_grant
        emit: enriched.user_role_grant
        enrich:
          - lookup: user_email_by_role
            bind:
              role_id: user_id          # @role_id ← column user_id (data, then old)
            into: user                  # → Event.Enrichment["user"]

      # TERMINAL: reads enriched event and runs the side-effect handler.
      - stream: enriched.user_role_grant
        handler: permission-sync

      # BROADCAST / SHARED STREAM: scope: shared means the raw key is used
      # (no instance prefix). Every instance gets its own consumer group
      # (group = instanceID), so each instance sees all events — fan-out.
      # Use for controller/notification streams where every instance must act.
      # - stream: controller.notifications
      #   scope: shared
      #   handler: notification-handler

      # ENRICHED TERMINAL: enrich + handler, no emit.
      # - stream: cdc.orders
      #   handler: order-sync@v1
      #   enrich:
      #     - lookup: customer_by_id
      #       bind: { customer_id: customer_id }
      #       into: customer
